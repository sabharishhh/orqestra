# =====================================================
# FINANCE vertical preset
# =====================================================
# Target customers: banks, brokerages, robo-advisors, fintech,
# wealth managers, lending platforms.
#
# Tuning rationale:
#   - Pricing thresholds tightened (0.30 / 0.35 vs consumer 0.40 / 0.45)
#     because financial entities like rates, fees, and quotes are
#     numerically precise — small embedding drift can mean a meaningful
#     dollar disagreement.
#
#   - NLI floor 0.65 — middle ground. Finance has structured audit
#     pipelines, so false positives cost less than in clinical, but
#     a missed contradiction in customer-facing quotes is materially
#     damaging.
#
#   - Costs: per-entity exposures calibrated against typical loan/fee
#     remediation amounts ($10K-$200K) and regulatory finding scales
#     ($1M+ for critical patterns).
# =====================================================

detection_config:
  bootstrap_min_samples: 3
  high_variance_threshold: 0.35
  semantic_match_threshold: 0.58
  cluster_min_size: 5
  cluster_merge_threshold: 0.20
  induction_lookback_days: 7
  induction_cluster_threshold: 0.32
  induction_min_cluster_size: 5
  induction_merge_threshold: 0.20
  regression_dedup_days: 10
  semantic_suppression_distance: 0.04
  coherence_window_days: 30
  recency_decay_lambda: 0.05
  nli_confidence_floor: 0.65
  blast_radius_decay: 0.65

category_thresholds:
  - category: pricing
    level_0_cosine: 0.30
    level_3_cosine: 0.35
    nli_floor: 0.65
  - category: compliance
    level_0_cosine: 0.28
    level_3_cosine: 0.33
    nli_floor: 0.65
  - category: policy
    level_0_cosine: 0.32
    level_3_cosine: 0.37
    nli_floor: 0.65
  - category: clinical
    level_0_cosine: 0.25
    level_3_cosine: 0.30
    nli_floor: 0.60
  - category: consumer
    level_0_cosine: 0.40
    level_3_cosine: 0.45
    nli_floor: null
  - category: general
    level_0_cosine: 0.35
    level_3_cosine: 0.40
    nli_floor: null

canonical_entities:
  - name: interest_rate
    description: Interest rates quoted on loans, deposits, mortgages, or credit products
    category: pricing
    importance: 0.95
    severity_tier: critical
    cost_high_usd: 50000
    cost_critical_usd: 1000000
    aliases:
      - apr
      - apy
      - loan_rate
      - mortgage_rate
      - deposit_rate
      - quoted_rate
      - effective_rate

  - name: fee_structure
    description: Account fees, transaction fees, advisory fees, or fund expense ratios
    category: pricing
    importance: 0.90
    severity_tier: high
    cost_high_usd: 25000
    cost_critical_usd: 500000
    aliases:
      - account_fees
      - transaction_fees
      - advisory_fees
      - management_fees
      - expense_ratio
      - service_charges

  - name: investment_recommendation
    description: Specific investment products, portfolios, or asset allocations advised to a client
    category: pricing
    importance: 0.92
    severity_tier: critical
    cost_high_usd: 100000
    cost_critical_usd: 2000000
    aliases:
      - portfolio_recommendation
      - asset_allocation
      - investment_advice
      - product_recommendation
      - rebalancing_suggestion

  - name: risk_disclosure
    description: Required risk warnings, suitability statements, and material disclosures
    category: compliance
    importance: 0.96
    severity_tier: critical
    cost_high_usd: 200000
    cost_critical_usd: 5000000
    aliases:
      - risk_warning
      - suitability_statement
      - material_disclosure
      - regulatory_disclaimer
      - fiduciary_disclosure

  - name: credit_decision
    description: Underwriting decisions, credit limits, approval criteria
    category: policy
    importance: 0.90
    severity_tier: high
    cost_high_usd: 30000
    cost_critical_usd: 750000
    aliases:
      - underwriting_decision
      - credit_limit
      - approval_criteria
      - lending_decision
      - credit_terms

  - name: kyc_aml_status
    description: Know-your-customer and anti-money-laundering verification status
    category: compliance
    importance: 0.95
    severity_tier: critical
    cost_high_usd: 150000
    cost_critical_usd: 10000000
    aliases:
      - kyc_status
      - aml_check
      - identity_verification
      - sanctions_screening
      - pep_check
      - bsa_compliance

pii_allowlist:
  - apr
  - apy
