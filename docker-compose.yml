services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orqestra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # F5.4 Compliance: PgBouncer for Celery Pool Connection Management
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    ports:
      - "6432:5432"

    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt

    depends_on:
      - postgres

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@pgbouncer:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - pgbouncer
      - redis

  # WORKER 1: claim_extraction queue
  worker_extraction:
    build: .
    command: celery -A core.celery_app worker -Q claim_extraction --concurrency=2 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@pgbouncer:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - pgbouncer
      - redis

  # WORKER 2: Default queue (SCCG writing, OBG updating, Contradictions)
  worker_default:
    build: .
    command: celery -A core.celery_app worker -Q celery --concurrency=4 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@pgbouncer:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - pgbouncer
      - redis

  # WORKER 3: Dead Letter Queue handler
  worker_dlq:
    build: .
    command: celery -A core.celery_app worker -Q dead_letters --concurrency=1 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@pgbouncer:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - pgbouncer
      - redis

  # WORKER 4: The Scheduler
  worker_beat:
    build: .
    command: celery -A core.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password@pgbouncer:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - pgbouncer
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data: