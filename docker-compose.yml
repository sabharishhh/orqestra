services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orqestra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orqestra"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # F5.4: PgBouncer — production connection pooling (not in dev connection path)
  # pgbouncer/pgbouncer:latest is amd64-only; runs under emulation on ARM and
  # produces unstable auth behaviour. Services connect to postgres directly in dev.
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    ports:
      - "6432:6432"
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_USER: postgres
      DATABASES_PASSWORD: password
      DATABASES_DBNAME: orqestra
      PGBOUNCER_AUTH_TYPE: trust
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "1000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "40"
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ORQESTRA_NLI_BACKEND=openai
      - ORQESTRA_ENV=prod
      - ORQESTRA_LOG_LEVEL=INFO
      - ORQESTRA_METRICS_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # WORKER 1: claim_extraction queue
  worker_extraction:
    build: .
    command: watchfiles "celery -A core.celery_app worker -Q claim_extraction --concurrency=2 --loglevel=info" /app
    volumes:
      - ./:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ORQESTRA_NLI_BACKEND=openai
      - ORQESTRA_ENV=prod
      - ORQESTRA_LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # WORKER 2: Default queue (SCCG writing, OBG updating, Contradictions)
  worker_default:
    build: .
    command: watchfiles "celery -A core.celery_app worker -Q celery --concurrency=4 --loglevel=info" /app
    volumes:
      - ./:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ORQESTRA_NLI_BACKEND=openai
      - ORQESTRA_ENV=prod
      - ORQESTRA_LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # WORKER 3: Dead Letter Queue handler
  worker_dlq:
    build: .
    command: celery -A core.celery_app worker -Q dead_letters --concurrency=1 --loglevel=info
    volumes:
      - ./:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - ORQESTRA_NLI_BACKEND=openai
      - ORQESTRA_ENV=prod
      - ORQESTRA_LOG_LEVEL=INFO 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # WORKER 4: The Scheduler
  worker_beat:
    build: .
    command: celery -A core.celery_app beat --loglevel=info
    volumes:
      - ./:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/orqestra
      - REDIS_URL=redis://redis:6379/0
      - ORQESTRA_NLI_BACKEND=openai
      - ORQESTRA_ENV=prod
      - ORQESTRA_LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  fitness_agent:
    build:
      context: .
      dockerfile: demo/agents/Dockerfile
    command: uvicorn demo.agents.agent_service:app --host 0.0.0.0 --port 8101 --reload
    ports:
      - "8101:8101"
    volumes:
      - ./:/app
      - /app/.venv
    env_file:
      - demo/.env.fitness_agent
    environment:
      - AGENT_NAME=FitnessAgent
      - KB_PATH=/app/demo/kb/fitness_agent.yaml
      - USER_PROFILE=/app/demo/data/user_profile.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8101
    depends_on:
      - api

  medical_agent:
    build:
      context: .
      dockerfile: demo/agents/Dockerfile
    command: uvicorn demo.agents.agent_service:app --host 0.0.0.0 --port 8102 --reload
    ports:
      - "8102:8102"
    volumes:
      - ./:/app
      - /app/.venv
    env_file:
      - demo/.env.medical_agent
    environment:
      - AGENT_NAME=MedicalAgent
      - KB_PATH=/app/demo/kb/medical_agent.yaml
      - USER_PROFILE=/app/demo/data/user_profile.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8102
    depends_on:
      - api

  nutrition_agent:
    build:
      context: .
      dockerfile: demo/agents/Dockerfile
    command: uvicorn demo.agents.agent_service:app --host 0.0.0.0 --port 8103 --reload
    ports:
      - "8103:8103"
    volumes:
      - ./:/app
      - /app/.venv
    env_file:
      - demo/.env.nutrition_agent
    environment:
      - AGENT_NAME=NutritionAgent
      - KB_PATH=/app/demo/kb/nutrition_agent.yaml
      - USER_PROFILE=/app/demo/data/user_profile.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8103
    depends_on:
      - api

  recovery_agent:
    build:
      context: .
      dockerfile: demo/agents/Dockerfile
    command: uvicorn demo.agents.agent_service:app --host 0.0.0.0 --port 8104 --reload
    ports:
      - "8104:8104"
    volumes:
      - ./:/app
      - /app/.venv
    env_file:
      - demo/.env.recovery_agent
    environment:
      - AGENT_NAME=RecoveryAgent
      - KB_PATH=/app/demo/kb/recovery_agent.yaml
      - USER_PROFILE=/app/demo/data/user_profile.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8104
    depends_on:
      - api

  budget_agent:
    build:
      context: .
      dockerfile: demo/agents/Dockerfile
    command: uvicorn demo.agents.agent_service:app --host 0.0.0.0 --port 8105 --reload
    ports:
      - "8105:8105"
    volumes:
      - ./:/app
      - /app/.venv
    env_file:
      - demo/.env.budget_agent
    environment:
      - AGENT_NAME=BudgetAgent
      - KB_PATH=/app/demo/kb/budget_agent.yaml
      - USER_PROFILE=/app/demo/data/user_profile.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8105
    depends_on:
      - api

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app   
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data: